<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{ app_name }} — Files</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      .file-list { display: grid; gap: 2px; }
      .file-row {
        display: grid;
        grid-template-columns: auto 1fr auto auto;
        gap: 12px; align-items: center;
        padding: 8px 12px; border-radius: 8px;
        font-size: 14px; cursor: default;
      }
      .file-row:hover { background: #f1f5f9; }
      .file-row.dir { cursor: pointer; }
      .file-row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .file-row .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
      .file-row .file-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
      .file-row:hover .file-actions { opacity: 1; }
      .file-icon { width: 20px; text-align: center; color: var(--accent); }
      .breadcrumb-nav { display: flex; align-items: center; gap: 4px; font-size: 14px; flex-wrap: wrap; }
      .breadcrumb-nav a, .breadcrumb-nav span { padding: 4px 8px; border-radius: 6px; text-decoration: none; color: var(--text); }
      .breadcrumb-nav a:hover { background: #e2e8f0; }
      .breadcrumb-nav .sep { color: var(--muted); padding: 0; }
      .root-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
      .root-tab {
        padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border);
        background: #f8fafc; font-weight: 600; font-size: 14px; cursor: pointer;
        text-decoration: none; color: var(--text); transition: all 0.15s;
      }
      .root-tab:hover, .root-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
      .icon-btn {
        width: 28px; height: 28px; border: none; border-radius: 6px;
        background: transparent; cursor: pointer; display: grid; place-items: center;
        color: var(--muted); font-size: 13px;
      }
      .icon-btn:hover { background: #e2e8f0; color: var(--text); }
      .icon-btn.danger:hover { background: #fee2e2; color: #dc2626; }
      .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
      .drop-zone {
        border: 2px dashed var(--border); border-radius: 12px; padding: 24px;
        text-align: center; color: var(--muted); font-size: 14px; margin-top: 12px;
        transition: all 0.2s; cursor: pointer;
      }
      .drop-zone.dragover { border-color: var(--accent); background: #eff6ff; color: var(--accent); }
      .selected { background: #eff6ff !important; }
      .modal-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.4); display: none; place-items: center; z-index: 100;
      }
      .modal-overlay.show { display: grid; }
      .modal-box {
        background: #fff; border-radius: 16px; padding: 24px; min-width: 360px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      }
      .modal-box h3 { margin: 0 0 16px; }
      .modal-box input { width: 100%; margin-bottom: 12px; }
      .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    </style>
  </head>
  <body>
    <header class="mb-4 d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <a href="/" class="hub-icon" style="text-decoration:none">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
          <h1 class="mb-1">File Manager</h1>
          <div class="subtle">Browse and manage files on your Pi</div>
        </div>
      </div>
    </header>

    <section class="card">
      <div class="root-tabs" id="root-tabs">
        {% for name, path in roots.items() %}
        <a class="root-tab" data-root="{{ name }}" href="#">
          <i class="fa-solid fa-folder"></i> {{ name }}
        </a>
        {% endfor %}
      </div>

      <div class="breadcrumb-nav" id="breadcrumb"></div>

      <div class="toolbar" id="toolbar" style="display:none">
        <button class="btn-info" id="btn-new-folder" style="font-size:13px;padding:6px 12px">
          <i class="fa-solid fa-folder-plus"></i> New Folder
        </button>
        <button class="btn-danger" id="btn-delete-selected" style="font-size:13px;padding:6px 12px;display:none">
          <i class="fa-solid fa-trash"></i> Delete Selected
        </button>
        <button class="btn-secondary" id="btn-move-selected" style="font-size:13px;padding:6px 12px;display:none">
          <i class="fa-solid fa-arrows-up-down-left-right"></i> Move Selected
        </button>
      </div>

      <div class="file-list" id="file-list">
        <p class="subtle" style="text-align:center;padding:24px">Select a folder above to browse.</p>
      </div>

      <div class="drop-zone" id="drop-zone" style="display:none">
        <i class="fa-solid fa-cloud-arrow-up" style="font-size:24px;margin-bottom:8px;display:block"></i>
        Drag files here or click to upload
        <input type="file" id="file-input" multiple style="display:none" />
      </div>
    </section>

    <!-- Rename Modal -->
    <div class="modal-overlay" id="rename-modal">
      <div class="modal-box">
        <h3><i class="fa-solid fa-pen"></i> Rename</h3>
        <input type="text" id="rename-input" />
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal('rename-modal')" style="padding:6px 16px;font-size:14px">Cancel</button>
          <button class="btn-primary" id="rename-confirm" style="padding:6px 16px;font-size:14px">Rename</button>
        </div>
      </div>
    </div>

    <!-- Move Modal -->
    <div class="modal-overlay" id="move-modal">
      <div class="modal-box">
        <h3><i class="fa-solid fa-arrows-up-down-left-right"></i> Move to folder</h3>
        <p class="subtle" style="margin-bottom:8px">Enter destination path (relative to current root):</p>
        <input type="text" id="move-dest" placeholder="e.g. subfolder or . for root" />
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal('move-modal')" style="padding:6px 16px;font-size:14px">Cancel</button>
          <button class="btn-primary" id="move-confirm" style="padding:6px 16px;font-size:14px">Move</button>
        </div>
      </div>
    </div>

    <script>
      let currentRoot = null;
      let currentPath = "";
      let selectedFiles = new Set();

      const fileList = document.getElementById("file-list");
      const breadcrumb = document.getElementById("breadcrumb");
      const toolbar = document.getElementById("toolbar");
      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");
      const deleteBtn = document.getElementById("btn-delete-selected");
      const moveBtn = document.getElementById("btn-move-selected");

      function formatSize(bytes) {
        if (bytes == null) return "";
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
        if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + " MB";
        return (bytes / 1073741824).toFixed(2) + " GB";
      }

      function formatDate(ts) {
        return new Date(ts * 1000).toLocaleDateString("en-US", {
          month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit"
        });
      }

      function joinPath(a, b) {
        if (!a) return b;
        return a + "/" + b;
      }

      // Root tab clicks
      document.getElementById("root-tabs").addEventListener("click", (e) => {
        const tab = e.target.closest("[data-root]");
        if (!tab) return;
        e.preventDefault();
        document.querySelectorAll(".root-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentRoot = tab.dataset.root;
        currentPath = "";
        selectedFiles.clear();
        browse();
      });

      async function browse() {
        toolbar.style.display = "flex";
        dropZone.style.display = "block";
        selectedFiles.clear();
        updateSelectionUI();

        const res = await fetch(`/files/browse?root=${encodeURIComponent(currentRoot)}&path=${encodeURIComponent(currentPath)}`);
        const data = await res.json();
        if (!data.ok) {
          fileList.innerHTML = `<p class="subtle" style="padding:12px">Error: ${data.error}</p>`;
          return;
        }

        // Breadcrumb
        let bc = `<a href="#" data-nav="">&#128193; ${currentRoot}</a>`;
        if (currentPath) {
          const parts = currentPath.split("/");
          let accum = "";
          parts.forEach(p => {
            accum = accum ? accum + "/" + p : p;
            bc += `<span class="sep">/</span><a href="#" data-nav="${accum}">${p}</a>`;
          });
        }
        breadcrumb.innerHTML = bc;

        breadcrumb.querySelectorAll("a[data-nav]").forEach(a => {
          a.addEventListener("click", (e) => {
            e.preventDefault();
            currentPath = a.dataset.nav;
            browse();
          });
        });

        // File list
        if (data.items.length === 0) {
          fileList.innerHTML = '<p class="subtle" style="padding:12px;text-align:center">Empty folder</p>';
          return;
        }

        fileList.innerHTML = "";
        data.items.forEach(item => {
          const row = document.createElement("div");
          row.className = "file-row" + (item.is_dir ? " dir" : "");
          const relPath = joinPath(currentPath, item.name);

          const icon = item.is_dir ? "fa-folder" :
            /\.(mp4|mkv|avi|m4v|mov)$/i.test(item.name) ? "fa-file-video" :
            /\.(jpg|jpeg|png|gif|webp)$/i.test(item.name) ? "fa-file-image" :
            /\.(mp3|flac|wav|aac)$/i.test(item.name) ? "fa-file-audio" :
            /\.(zip|tar|gz|rar|7z)$/i.test(item.name) ? "fa-file-zipper" :
            /\.(pdf)$/i.test(item.name) ? "fa-file-pdf" :
            "fa-file";

          row.innerHTML = `
            <div class="file-icon"><i class="fa-solid ${icon}"></i></div>
            <div class="name">${item.name}</div>
            <div class="meta">${item.is_dir ? "" : formatSize(item.size)} ${formatDate(item.modified)}</div>
            <div class="file-actions">
              ${!item.is_dir ? `<button class="icon-btn" title="Download" data-action="download" data-path="${relPath}"><i class="fa-solid fa-download"></i></button>` : ""}
              <button class="icon-btn" title="Move" data-action="move" data-path="${relPath}" data-name="${item.name}"><i class="fa-solid fa-arrows-up-down-left-right"></i></button>
              <button class="icon-btn" title="Rename" data-action="rename" data-path="${relPath}" data-name="${item.name}"><i class="fa-solid fa-pen"></i></button>
              <button class="icon-btn danger" title="Delete" data-action="delete" data-path="${relPath}" data-name="${item.name}"><i class="fa-solid fa-trash"></i></button>
            </div>
          `;

          // Directory click to navigate
          if (item.is_dir) {
            row.addEventListener("click", (e) => {
              if (e.target.closest(".file-actions")) return;
              currentPath = relPath;
              browse();
            });
          }

          // Selection via ctrl-click
          row.addEventListener("click", (e) => {
            if (!e.ctrlKey && !e.metaKey) return;
            e.preventDefault();
            e.stopPropagation();
            if (selectedFiles.has(relPath)) {
              selectedFiles.delete(relPath);
              row.classList.remove("selected");
            } else {
              selectedFiles.add(relPath);
              row.classList.add("selected");
            }
            updateSelectionUI();
          });

          fileList.appendChild(row);
        });
      }

      function updateSelectionUI() {
        const hasSelection = selectedFiles.size > 0;
        deleteBtn.style.display = hasSelection ? "inline-flex" : "none";
        moveBtn.style.display = hasSelection ? "inline-flex" : "none";
      }

      // File actions (download, rename, delete)
      fileList.addEventListener("click", async (e) => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        e.stopPropagation();
        const action = btn.dataset.action;
        const path = btn.dataset.path;
        const name = btn.dataset.name;

        if (action === "download") {
          window.open(`/files/download?root=${encodeURIComponent(currentRoot)}&path=${encodeURIComponent(path)}`);
        } else if (action === "rename") {
          showRenameModal(path, name);
        } else if (action === "move") {
          showMoveModal([path]);
        } else if (action === "delete") {
          if (!confirm(`Delete "${name}"?`)) return;
          const res = await fetch("/files/delete", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ root: currentRoot, path: path }),
          });
          const data = await res.json();
          if (data.ok) browse();
          else alert(data.error || "Delete failed.");
        }
      });

      // Rename modal
      function showRenameModal(path, currentName) {
        const modal = document.getElementById("rename-modal");
        const input = document.getElementById("rename-input");
        input.value = currentName;
        modal.classList.add("show");
        input.focus();
        input.select();

        document.getElementById("rename-confirm").onclick = async () => {
          const newName = input.value.trim();
          if (!newName || newName === currentName) { closeModal("rename-modal"); return; }
          const res = await fetch("/files/rename", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ root: currentRoot, path: path, new_name: newName }),
          });
          const data = await res.json();
          closeModal("rename-modal");
          if (data.ok) browse();
          else alert(data.error || "Rename failed.");
        };
      }

      // New folder
      document.getElementById("btn-new-folder").addEventListener("click", () => {
        const name = prompt("New folder name:");
        if (!name) return;
        fetch("/files/mkdir", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ root: currentRoot, path: currentPath, name: name }),
        }).then(r => r.json()).then(data => {
          if (data.ok) browse();
          else alert(data.error || "Failed.");
        });
      });

      // Bulk delete
      deleteBtn.addEventListener("click", async () => {
        if (!confirm(`Delete ${selectedFiles.size} item(s)?`)) return;
        for (const path of selectedFiles) {
          await fetch("/files/delete", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ root: currentRoot, path: path }),
          });
        }
        selectedFiles.clear();
        browse();
      });

      // Move modal (works for single file or bulk)
      function showMoveModal(paths) {
        document.getElementById("move-dest").value = currentPath;
        document.getElementById("move-modal").classList.add("show");
        document.getElementById("move-dest").focus();
        document.getElementById("move-confirm").onclick = async () => {
          const dest = document.getElementById("move-dest").value.trim();
          closeModal("move-modal");
          for (const p of paths) {
            await fetch("/files/move", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({ root: currentRoot, path: p, dest: dest }),
            });
          }
          selectedFiles.clear();
          browse();
        };
      }

      // Bulk move
      moveBtn.addEventListener("click", () => {
        showMoveModal([...selectedFiles]);
      });

      // Upload via drop zone
      dropZone.addEventListener("click", () => fileInput.click());
      dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        uploadFiles(e.dataTransfer.files);
      });
      fileInput.addEventListener("change", () => { uploadFiles(fileInput.files); fileInput.value = ""; });

      async function uploadFiles(files) {
        if (!files.length || !currentRoot) return;
        dropZone.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
        const fd = new FormData();
        fd.append("root", currentRoot);
        fd.append("path", currentPath);
        for (const f of files) fd.append("files", f);
        const res = await fetch("/files/upload", { method: "POST", body: fd });
        const data = await res.json();
        dropZone.innerHTML = data.ok
          ? `Uploaded ${data.uploaded.length} file(s)`
          : "Upload failed: " + (data.error || "Unknown error");
        setTimeout(() => {
          dropZone.innerHTML = '<i class="fa-solid fa-cloud-arrow-up" style="font-size:24px;margin-bottom:8px;display:block"></i>Drag files here or click to upload<input type="file" id="file-input" multiple style="display:none" />';
          document.getElementById("file-input").addEventListener("change", function() { uploadFiles(this.files); this.value = ""; });
        }, 3000);
        browse();
      }

      function closeModal(id) { document.getElementById(id).classList.remove("show"); }
      document.querySelectorAll(".modal-overlay").forEach(m => {
        m.addEventListener("click", (e) => { if (e.target === m) m.classList.remove("show"); });
      });
    </script>
  </body>
</html>
